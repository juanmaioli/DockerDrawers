services:
  drawers_mariadb:
    # Versión LTS de MariaDB para mayor estabilidad y soporte a largo plazo
    image: mariadb:10.11
    container_name: drawers_mariadb
    command: '--default-authentication-plugin=mysql_native_password'
    volumes:
      - ./db_data:/var/lib/mysql
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=Lasflores506
      - MARIADB_DATABASE=admin_drawers
      - MARIADB_USER=juan
      - MARIADB_PASSWORD=Lasflores506
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "--password=Lasflores506"]
      interval: 10s
      timeout: 5s
      retries: 5
#    ports:
#      - "3306:3306"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
  drawers_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drawers_web
    restart: always
    depends_on:
      drawers_mariadb:
        condition: service_healthy
    volumes:
      - ./www_data:/var/www/html
      - ./apache_data:/etc/apache2
      - ./php_data/php.ini:/usr/local/etc/php/php.ini
    environment:
      - DB_SERVER=drawers_mariadb
      - DB_USER=juan
      - DB_PASS=Lasflores506
      - DB_NAME=admin_drawers
      - DB_PORT=3306
    ports:
      - "8090:80"
      - "8443:443"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
volumes:
  db_data:
